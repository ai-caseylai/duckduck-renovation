<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DUCKDUCK 裝修{% endblock %}</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg: #f5f7fa;
            --sidebar-bg: #1a1d23;
            --card-bg: #ffffff;
            --primary: #2563eb;
            --success: #16a34a;
            --warning: #f59e0b;
            --danger: #dc2626;
            --text: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius: 12px;
            --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); display: flex; min-height: 100vh; }
        /* Sidebar */
        .sidebar { width: 220px; background: var(--sidebar-bg); color: #e2e8f0; display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 100; }
        .sidebar-brand { padding: 20px 18px; font-size: 18px; font-weight: 700; border-bottom: 1px solid rgba(255,255,255,.08); display: flex; align-items: center; gap: 8px; }
        .sidebar-brand .icon { font-size: 24px; }
        .sidebar-nav { flex: 1; padding: 12px 0; }
        .sidebar-nav a { display: flex; align-items: center; gap: 10px; padding: 10px 18px; color: #94a3b8; text-decoration: none; font-size: 14px; transition: all .15s; border-left: 3px solid transparent; }
        .sidebar-nav a:hover { color: #e2e8f0; background: rgba(255,255,255,.05); }
        .sidebar-nav a.active { color: #fff; background: rgba(37,99,235,.2); border-left-color: var(--primary); font-weight: 600; }
        .sidebar-nav .nav-icon { font-size: 16px; width: 20px; text-align: center; }
        /* Main */
        .main { margin-left: 220px; flex: 1; padding: 24px 28px; max-width: 1200px; width: calc(100% - 220px); }
        .page-header { margin-bottom: 24px; }
        .page-header h1 { font-size: 24px; font-weight: 700; }
        .page-header p { color: var(--text-muted); font-size: 14px; margin-top: 4px; }
        /* Cards */
        .card { background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px; margin-bottom: 20px; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .card-header h2 { font-size: 16px; font-weight: 600; }
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; margin-bottom: 24px; }
        .stat-card { background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow); padding: 18px; display: flex; align-items: center; gap: 14px; }
        .stat-icon { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .stat-icon.blue { background: #dbeafe; color: #2563eb; }
        .stat-icon.green { background: #dcfce7; color: #16a34a; }
        .stat-icon.amber { background: #fef3c7; color: #d97706; }
        .stat-icon.red { background: #fee2e2; color: #dc2626; }
        .stat-icon.purple { background: #ede9fe; color: #7c3aed; }
        .stat-value { font-size: 24px; font-weight: 700; }
        .stat-label { font-size: 12px; color: var(--text-muted); }
        /* Table */
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { text-align: left; padding: 10px 12px; font-weight: 600; color: var(--text-muted); font-size: 11px; text-transform: uppercase; letter-spacing: .5px; border-bottom: 2px solid var(--border); }
        td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
        tr:hover { background: #f8fafc; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .badge-pending { background: #fef3c7; color: #92400e; }
        .badge-done { background: #dcfce7; color: #166534; }
        .badge-cancel { background: #fee2e2; color: #991b1b; }
        .badge-confirm { background: #dbeafe; color: #1e40af; }
        .badge-paid { background: #dcfce7; color: #166534; }
        .badge-unpaid { background: #fee2e2; color: #991b1b; }
        /* Buttons */
        .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; text-decoration: none; transition: all .15s; }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-outline { background: #fff; color: var(--text); border: 1px solid var(--border); }
        .btn-outline:hover { background: #f8fafc; }
        .btn-sm { padding: 5px 10px; font-size: 12px; }
        .btn-danger { background: #fff; color: var(--danger); border: 1px solid #fecaca; }
        .btn-danger:hover { background: #fef2f2; }
        .btn-group { display: flex; gap: 6px; flex-wrap: wrap; }
        /* Forms */
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; }
        input, textarea, select { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; font-family: inherit; }
        textarea { min-height: 280px; resize: vertical; font-family: 'SF Mono', 'Menlo', monospace; font-size: 12px; line-height: 1.5; }
        input:focus, textarea:focus, select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
        /* Alerts */
        .alert { padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; font-size: 13px; }
        .alert-success { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .alert-error { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        .alert-info { background: #dbeafe; color: #1e40af; border: 1px solid #bfdbfe; }
        /* Grid */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        @media (max-width: 768px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } .sidebar { width: 60px; } .sidebar-brand span { display: none; } .sidebar-nav a span { display: none; } .main { margin-left: 60px; width: calc(100% - 60px); } }
        /* Empty state */
        .empty { text-align: center; padding: 40px; color: var(--text-muted); }
        .empty .icon { font-size: 40px; margin-bottom: 12px; }
        /* Result cards */
        .result-card { border: 1px solid #bbf7d0; border-radius: var(--radius); padding: 16px; margin-bottom: 12px; background: #f0fdf4; }
        .result-card h3 { font-size: 14px; color: #166534; margin-bottom: 8px; }
        .result-card .items { font-size: 12px; color: var(--text-muted); }
        /* Charts */
        .chart-container { position: relative; height: 280px; }
        /* Link */
        .link { color: var(--primary); text-decoration: none; font-weight: 500; }
        .link:hover { text-decoration: underline; }
        /* Toolbar */
        .toolbar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
        .toolbar select, .toolbar input { width: auto; }
        .summary-bar { display: flex; gap: 20px; padding: 12px 0; font-size: 13px; color: var(--text-muted); border-top: 1px solid var(--border); margin-top: 12px; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-brand">
            <span class="icon">🏗️</span>
            <span>DUCKDUCK</span>
        </div>
        <nav class="sidebar-nav">
            <a href="/" class="{{ 'active' if active == 'dashboard' else '' }}">
                <span class="nav-icon">📊</span> <span>儀表板</span>
            </a>
            <a href="/orders" class="{{ 'active' if active == 'orders' else '' }}">
                <span class="nav-icon">📋</span> <span>工單列表</span>
            </a>
            <a href="/parse" class="{{ 'active' if active == 'parse' else '' }}">
                <span class="nav-icon">📥</span> <span>匯入工單</span>
            </a>
            <a href="/schedule" class="{{ 'active' if active == 'schedule' else '' }}">
                <span class="nav-icon">📅</span> <span>排程</span>
            </a>
            <a href="/analysis" class="{{ 'active' if active == 'analysis' else '' }}">
                <span class="nav-icon">📈</span> <span>報價分析</span>
            </a>
            <a href="/contacts" class="{{ 'active' if active == 'contacts' else '' }}">
                <span class="nav-icon">👥</span> <span>客戶</span>
            </a>
        </nav>
    </aside>
    <main class="main">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="alert alert-{{ 'error' if category == 'error' else 'success' if category == 'success' else 'info' }}">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </main>
</body>
</html>
